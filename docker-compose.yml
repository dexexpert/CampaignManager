services:
  db:
    image: postgres:16
    container_name: mini_campaign_manager_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mini_campaign_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mini_campaign_manager"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

